<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المقال | رؤية المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #5142a2; --secondary: #00d2ff; --accent: #ff007a; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f9f9fb; color: #333; }
        .details-header { background: var(--primary); padding: 80px 20px; text-align: center; color: white; }
        .details-header h1 { font-family: 'Amiri', serif; font-size: 3rem; margin: 0; }
        .container { max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; }
        .main-img { width: 100%; height: 450px; object-fit: cover; border-radius: 20px; margin-bottom: 30px; }
        .meta-info { display: flex; gap: 20px; color: var(--accent); font-weight: bold; margin-bottom: 20px; }
        .content-text { line-height: 2; font-size: 1.2rem; text-align: justify; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 30px; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); transform: translateX(10px); }
    </style>
</head>
<body>

    <div class="details-header">
        <h1 id="blog-title">جاري التحميل...</h1>
    </div>

    <div class="container">
        <img id="blog-image" src="" alt="" class="main-img">
        <div class="meta-info">
            <span><i class="fas fa-calendar-alt"></i> <span id="blog-date"></span></span>
            <span><i class="fas fa-user"></i> بواسطة: إدارة رؤية المستقبل</span>
        </div>
        <div class="content-text" id="blog-content">
        </div>
        <a href="index.html#blog" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمدونة</a>
    </div>

    <script>
        const blogData = {
            "1": {
                title: "أحدث صيحات الألوان والدهانات لعام 2026",
                date: "15 مايو 2026",
                image: "images/WhatsApp Image 2026-07-14 at 1.25.57 PM.jpeg",
                content: "في عام 2026، تتجه الأنظار نحو الألوان المستوحاة من الطبيعة الهادئة ممزوجة بلمسات ذكية. نحن في رؤية المستقبل نوفر دهانات نانو تكنولوجي التي تعكس الحرارة، مما يجعلها مثالية لجو الرياض. الألوان الترابية والأزرق السماوي العميق هما الخيار المفضل للمجالس المودرن هذا العام. بالإضافة إلى ذلك، نقدم تقنيات دهان تمنع تراكم الغبار والشوائب، مما يحافظ على جمال منزلك لفترات أطول وبأقل مجهود في التنظيف."
            },
            "2": {
                title: "دليل المقاولات العامة: كيف تخطط لبناء منزلك؟",
                date: "10 يونيو 2026",
                image: "images/OIP.webp",
                content: "التخطيط لبناء منزل هو رحلة العمر. تبدأ هذه الرحلة باختيار مقاولات عامة تمتلك سجلاً حافلاً من الإنجازات. في عام 2026، أصبح استخدام النمذجة ثلاثية الأبعاد قبل البدء في البناء أمراً ضرورياً. نحن نوفر لك فريقاً متكاملاً يشمل المهندسين والمشرفين والعمالة الماهرة لضمان تنفيذ كل ركن في المخطط بدقة 100%. التزامنا بالجداول الزمنية هو ما يميزنا كأفضل مقاول في الرياض."
            },
            "3": {
                title: "أفكار مبتكرة لتنسيق حدائق الفلل الصغيرة",
                date: "22 يوليو 2026",
                image: "images/about.png",
                content: "لا يهم حجم المساحة، ما يهم هو كيفية استغلالها. في رؤية المستقبل، قمنا بتطوير حلول ذكية لتنسيق الحدائق الصغيرة باستخدام الجدران الخضراء (Vertical Gardens) والإضاءة المخفية التي تعطي شعوراً بالاتساع. العشب الصناعي عالي الجودة والباركية الخشبي المقاوم للشمس هما الثنائي المثالي لحديقة عصرية عام 2026. نحن ندمج أنظمة الري الأوتوماتيكية التي يتم التحكم بها عبر الجوال لتوفير المياه والحفاظ على جمال حديقتك."
            }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('id');

        if (blogId && blogData[blogId]) {
            const article = blogData[blogId];
            document.getElementById('blog-title').innerText = article.title;
            document.getElementById('blog-date').innerText = article.date;
            document.getElementById('blog-image').src = article.image;
            document.getElementById('blog-content').innerText = article.content;
            document.title = article.title + " | رؤية المستقبل";
        } else {
            document.getElementById('blog-title').innerText = "المقال غير موجود";
        }
    </script>
</body>
</html>
